apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: chamberai-api
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "50"
        autoscaling.knative.dev/minScale: "2"
    spec:
      containerConcurrency: 200
      timeoutSeconds: 60
      containers:
      - image: gcr.io/PROJECT_ID/api:latest
        ports:
        - containerPort: 4000
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "4000"
        - name: FIRESTORE_PROJECT_ID
          value: "chamberai-prod"
        - name: CORS_ORIGIN
          value: "https://console.chamberai.com"
        - name: FIREBASE_AUTH_ENABLED
          value: "true"
        - name: SENTRY_DSN
          valueFrom:
            secretKeyRef:
              name: chamberai-secrets
              key: SENTRY_DSN
        - name: FIREBASE_SERVICE_ACCOUNT_JSON
          valueFrom:
            secretKeyRef:
              name: chamberai-secrets
              key: FIREBASE_SERVICE_ACCOUNT_JSON
        envFrom:
        - secretRef:
            name: chamberai-secrets
        resources:
          limits:
            cpu: "4"
            memory: "2Gi"
          requests:
            cpu: "2"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 5
      serviceAccountName: chamberai-api
  traffic:
  - percent: 100
    latestRevision: true
