<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CAM-AIMS Secretary Console</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="grain"></div>

    <!-- Topbar: Brand, API config, auth status -->
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">CAM</span>
        <div>
          <div class="brand-title">Secretary Console</div>
          <div class="brand-sub">Governance-first minutes workflow</div>
        </div>
      </div>
      <div class="api-config">
        <label for="apiBase">API Base</label>
        <input id="apiBase" type="url" placeholder="http://localhost:4000" />
        <button id="saveApiBase" class="btn ghost" data-testid="save-api-base">Save</button>
        <a
          href="https://webemo-aaron.github.io/ChamberAI/docs/viewer.html?doc=USER_GUIDE.md"
          target="_blank"
          rel="noopener noreferrer"
          class="btn ghost"
        >
          Docs
        </a>
        <span id="authCycleStatus" class="pill">Auth: not connected</span>
        <span id="roleBadge" class="pill">Role: Guest</span>
        <button id="logout" class="btn ghost" data-testid="logout">Logout</button>
      </div>
    </header>

    <!-- Navigation: View tabs -->
    <nav class="view-nav" role="navigation" aria-label="Application views">
      <button id="viewMeetingsBtn" class="view-tab active" aria-pressed="true">Meetings</button>
      <button id="viewBusinessHubBtn" class="view-tab" aria-pressed="false">Business Hub</button>
      <button id="viewKioskBtn" class="view-tab" aria-pressed="false" style="display: none;">AI Kiosk</button>
    </nav>

    <!-- Main: Meetings View (default) -->
    <main class="shell" id="meetingsView">
      <section class="left-pane">
        <!-- Onboarding Banner (Phase 5: content populated) -->
        <div id="onboardingBanner" class="onboarding-banner" style="display: none;">
          <span>Welcome to CAM-AIMS Secretary Console</span>
          <button id="dismissBanner" class="btn ghost">Dismiss</button>
        </div>

        <!-- Search Input (Phase 5: event handlers) -->
        <input id="meetingSearch" type="text" placeholder="Search meetings... (/)"/>

        <!-- Feature Flags Display (Phase 5: populated by flags module) -->
        <div id="featureFlagsEl" class="feature-flags" style="display: none;"></div>

        <!-- Content rendered by handlers -->
      </section>
      <section class="right-pane">
        <!-- Tab Bar (Phase 5: handlers manage active state) -->
        <div class="tab-bar" role="tablist">
          <button class="tab" role="tab" data-tab="minutes" aria-selected="false" tabindex="-1">Minutes</button>
          <button class="tab" role="tab" data-tab="actions" aria-selected="false" tabindex="-1">Actions</button>
          <button class="tab" role="tab" data-tab="audit" aria-selected="false" tabindex="-1">Audit Log</button>
          <button class="tab" role="tab" data-tab="motions" aria-selected="false" tabindex="-1">Motions</button>
          <button class="tab" role="tab" data-tab="public-summary" aria-selected="false" tabindex="-1">Public Summary</button>
        </div>

        <!-- Tab Panels (Phase 5: content rendered here) -->
        <div id="tab-minutes" class="tab-pane hidden"></div>
        <div id="tab-actions" class="tab-pane hidden"></div>
        <div id="tab-audit" class="tab-pane hidden"></div>
        <div id="tab-motions" class="tab-pane hidden"></div>
        <div id="tab-public-summary" class="tab-pane hidden"></div>

        <!-- Content rendered by handlers -->
      </section>
    </main>

    <!-- Main: Business Hub View (hidden) -->
    <main class="shell hidden" id="businessHubView">
      <!-- Content rendered by handlers -->
    </main>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden" role="status" aria-live="polite" aria-atomic="true"></div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle" aria-hidden="true">
      <div class="modal-content">
        <h2 id="loginModalTitle">Sign In</h2>
        <div class="modal-body">
          <button id="loginGoogle" class="btn" type="button">Continue with Google</button>
          <div class="hint" style="margin: 16px 0; text-align: center;">Or</div>
          <div class="grid">
            <label>
              Email
              <input id="loginEmail" type="email" placeholder="admin@acme.com" />
            </label>
            <label>
              Role
              <select id="loginRole">
                <option value="guest">Guest</option>
                <option value="secretary">Secretary</option>
                <option value="admin">Admin</option>
              </select>
            </label>
          </div>
          <button id="loginSubmit" class="btn" data-testid="login-submit">Enter</button>
        </div>
      </div>
    </div>

    <!-- Quick Create Modal -->
    <div id="quickModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="quickModalTitle" aria-hidden="true">
      <div class="modal-content">
        <h2 id="quickModalTitle">Quick Create Meeting</h2>
        <div class="modal-body">
          <div class="grid">
            <label>
              Location
              <input id="quickLocation" type="text" placeholder="Chamber Hall" />
            </label>
            <label>
              Chair
              <input id="quickChair" type="text" placeholder="Alex Chair" />
            </label>
            <label>
              Secretary
              <input id="quickSecretary" type="text" placeholder="Riley Secretary" />
            </label>
            <label>
              Tags
              <input id="quickTags" type="text" placeholder="budget, annual, special" />
            </label>
          </div>
          <div class="modal-actions">
            <button id="quickSubmit" class="btn" data-testid="quick-submit">Create</button>
            <button id="quickCancel" class="btn ghost" data-testid="quick-cancel">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- CSV Preview Modal -->
    <div id="csvPreviewModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="csvPreviewModalTitle" aria-hidden="true">
      <div class="modal-content">
        <h2 id="csvPreviewModalTitle">Import Action Items</h2>
        <div class="modal-body">
          <label>
            <input id="csvSkipInvalid" type="checkbox" checked />
            Skip invalid rows
          </label>
          <div id="csvPreviewNote" class="hint"></div>
          <div id="csvPreviewTable" class="preview-table"></div>
          <div class="modal-actions">
            <button id="csvApply" class="btn" data-testid="csv-apply">Apply Import</button>
            <button id="csvCancel" class="btn ghost" data-testid="csv-cancel">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Business Modal -->
    <div id="bizModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="bizModalTitle" aria-hidden="true">
      <div class="modal-content">
        <h2 id="bizModalTitle">Add Business</h2>
        <div class="modal-body">
          <div class="grid">
            <label>
              Name
              <input id="bizModalName" type="text" data-testid="biz-modal-name" />
            </label>
            <label>
              Category
              <input id="bizModalCategory" type="text" />
            </label>
            <label>
              Address
              <input id="bizModalAddress" type="text" />
            </label>
            <label>
              City
              <input id="bizModalCity" type="text" />
            </label>
            <label>
              State
              <input id="bizModalState" type="text" maxlength="2" />
            </label>
            <label>
              ZIP
              <input id="bizModalZip" type="text" />
            </label>
            <label>
              Phone
              <input id="bizModalPhone" type="tel" />
            </label>
            <label>
              Email
              <input id="bizModalEmail" type="email" />
            </label>
            <label>
              Geo Scope Type
              <select id="bizModalGeoType">
                <option value="city">City</option>
                <option value="zip_code">ZIP</option>
                <option value="town">Town</option>
              </select>
            </label>
            <label>
              Scope ID
              <input id="bizModalGeoId" type="text" />
            </label>
          </div>
          <div class="modal-actions">
            <button id="bizModalSubmit" class="btn" data-testid="biz-modal-submit">Create</button>
            <button id="bizModalCancel" class="btn ghost" data-testid="biz-modal-cancel">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Module entry point -->
    <script type="module" src="./app.js"></script>
  </body>
</html>
